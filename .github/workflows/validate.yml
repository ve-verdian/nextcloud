name: Validate Nextcloud Stack

on:
  push:
    branches:
      - main

  pull_request:

jobs:
  validate:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create dummy .env
        run: |
          cp .env.example .env

      - name: Validate Compose
        run: docker compose config
